name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum
      - run: go vet ./...
      - run: go test ./...
      - run: CGO_ENABLED=0 go build -o api .

  client:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
      - run: npm ci
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      # ponytail: no bundler/icons yet — ships the self-contained exe;
      # switch bundle.active on and add icons when branding exists.
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: chatte-vpn-windows
          path: client/src-tauri/target/release/chatte-vpn.exe
          if-no-files-found: error
