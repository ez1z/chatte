services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatte
      POSTGRES_PASSWORD: chatte
      POSTGRES_DB: chatte
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatte"]
      interval: 2s
      timeout: 2s
      retries: 15

  api:
    build: .
    environment:
      DATABASE_URL: postgres://chatte:chatte@db:5432/chatte?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
